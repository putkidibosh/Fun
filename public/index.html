<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. King | Video Manager </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #e9f1fa;
            --card-bg: rgba(255, 255, 255, 0.4);
            --text-color: #334155;
            --sub-text-color: #64748b;
            --btn-bg: rgba(255, 255, 255, 0.5);
            --btn-hover-bg: rgba(255, 255, 255, 0.8);
            --icon-color: #444;
            --input-bg: rgba(255, 255, 255, 0.3);
            --input-border: rgba(148, 163, 184, 0.5);
            --primary-accent: #0ea5e9;
            --danger-accent: #ef4444;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --text-color: #f1f5f9;
            --sub-text-color: #94a3b8;
            --btn-bg: rgba(51, 65, 85, 0.5);
            --btn-hover-bg: rgba(51, 65, 85, 0.8);
            --icon-color: #f1f5f9;
            --input-bg: rgba(15, 23, 42, 0.5);
            --input-border: rgba(51, 65, 85, 0.7);
            --primary-accent: #38bdf8;
            --danger-accent: #dc2626;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            transition: background 0.3s ease;
            position: relative;
        }

        /* Canvas Animation Layer (Z-Index Fixed) */
        #snow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1; /* কার্ডের ঠিক পেছনে থাকবে */
        }

        /* Neon Cursor Light */
        #cursor-light {
            position: fixed;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(255,0,255,0.4) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 35px 20px;
            width: 320px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 10; /* অ্যানিমেশনের উপরে ভেসে থাকবে */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .header-icons {
            display: flex;
            justify-content: space-between;
            position: absolute;
            width: 88%;
            top: 15px;
            left: 6%;
        }

        .icon-btn {
            background: var(--btn-bg);
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            color: var(--icon-color);
            cursor: pointer;
            transition: background 0.2s;
        }

        .icon-btn:hover {
            background: var(--btn-hover-bg);
        }

        .profile-img img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
        }

        h1 { font-size: 22px; color: var(--text-color); margin: 15px 0 5px; }
        .tagline { font-size: 12px; color: var(--sub-text-color); }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 15px;
        }

        .circle-icon {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 22px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .fb { color: #1877f2; }
        .insta { color: #e4405f; }

        /* Video Manager Section Styles */
        .video-manager-section {
            border-top: 1px solid var(--input-border);
            padding-top: 15px;
            margin-top: 15px;
            text-align: left;
        }

        .section-header {
            color: var(--primary-accent);
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        input[type="text"] {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-color);
            outline: none;
            font-size: 12px;
        }

        input[type="text"]::placeholder {
            color: var(--sub-text-color);
        }

        input[type="text"]:focus {
            border-color: var(--primary-accent);
        }

        .add-btn {
            background-color: var(--btn-bg);
            color: var(--text-color);
            border: 1px solid var(--input-border);
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .add-btn:hover {
            background-color: var(--btn-hover-bg);
            border-color: var(--primary-accent);
        }

        .add-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status-box {
            font-size: 12px;
            color: var(--sub-text-color);
            font-weight: 500;
            margin-bottom: 12px;
        }

        #totalCount {
            color: var(--primary-accent);
            font-weight: bold;
        }

        #linkList {
            list-style: none;
            margin: 0;
            padding: 0 5px 0 0;
            max-height: 160px;
            overflow-y: auto;
        }

        .link-item {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            padding: 8px 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .video-url {
            color: var(--primary-accent);
            text-decoration: none;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .video-url:hover {
            text-decoration: underline;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger-accent);
            padding: 4px 6px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        #linkList::-webkit-scrollbar {
            width: 4px;
        }
        #linkList::-webkit-scrollbar-thumb {
            background: var(--btn-bg);
            border-radius: 4px;
        }

        .bottom-btn-group {
            margin-top: 15px;
        }

        .link-btn {
            text-decoration: none;
            color: var(--text-color);
            font-weight: bold;
            font-size: 13px;
            border: 1px solid var(--input-border);
            padding: 11px 0;
            background: var(--btn-bg);
            width: 100%;
            border-radius: 12px;
            transition: background 0.2s, border-color 0.2s;
            text-align: center;
            display: block;
            box-sizing: border-box;
        }

        .link-btn:hover {
            background: var(--btn-hover-bg);
            border-color: var(--primary-accent);
        }
    </style>
</head>
<body>

    <canvas id="snow"></canvas>
    <div id="cursor-light"></div>

    <div class="card">
        <div class="header-icons">
            <button class="icon-btn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i></button>
            <button class="icon-btn" id="theme-toggle"><i class="fas fa-moon"></i></button>
        </div>

        <div class="profile-img">
            <img src="https://files.catbox.moe/ixj7u8.jpg" alt="Profile">
        </div>

        <h1>Mr. King <i class="fas fa-check-circle" style="color:#1d9bf0"></i></h1>
        <p class="tagline">~ Nothing is impossible ~</p>
        <div style="margin-bottom: 5px;">🕊️🦚</div>
        
        <div class="social-links">
            <a href="https://www.facebook.com/T4N1NC9B4R" class="circle-icon fb"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/itz.me_roni1?igsh=ZGJ0ZTZiMngzbDRi" class="circle-icon insta"><i class="fab fa-instagram"></i></a>
        </div>

        <div class="video-manager-section">
            <div class="section-header">📹 Video Link Manager</div>
            <div class="status-box">
                Total Uploaded: <span id="totalCount">0</span>
            </div>
            
            <div class="input-group">
                <input type="text" id="videoUrl" placeholder="Paste your Catbox link here...">
                <button class="add-btn" id="addBtn" onclick="addLink()">Add</button>
            </div>

            <div class="list-section">
                <ul id="linkList"></ul>
            </div>
        </div>

        <div class="bottom-btn-group">
            <a href="https://m.me/j/AbZ0oQNfk4O3xqds/?send_source=gc%3Acopy_invite_link_c" class="link-btn">JOIN OUR MESSENGER GC</a>
        </div>
    </div>

    <script>
        // Neon Light Effect
        const cursor = document.getElementById('cursor-light');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            const colors = ['rgba(255,0,255,0.4)', 'rgba(0,255,255,0.4)', 'rgba(0,255,0,0.4)'];
            cursor.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random()*colors.length)]} 0%, transparent 70%)`;
        });

        // Snowflakes Falling Animation (Fixed Engine)
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width, height, flakes = [];

        function initSnow() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            flakes = [];
            for (let i = 0; i < 45; i++) {
                flakes.push({ 
                    x: Math.random() * width, 
                    y: Math.random() * height, 
                    speed: Math.random() * 1.5 + 0.8,
                    size: Math.random() * 6 + 12
                });
            }
        }

        function drawSnow() {
            ctx.clearRect(0, 0, width, height);
            flakes.forEach(f => {
                ctx.font = `${f.size}px serif`;
                ctx.fillText('❄️', f.x, f.y);
                f.y += f.speed;
                if (f.y > height) f.y = -20;
            });
            requestAnimationFrame(drawSnow);
        }
        
        initSnow(); 
        drawSnow();
        window.addEventListener('resize', initSnow);

        // Theme Toggle
        const toggleBtn = document.getElementById('theme-toggle');
        const rootElement = document.documentElement;
        
        if(localStorage.getItem('theme') === 'dark') {
            rootElement.setAttribute('data-theme', 'dark');
            toggleBtn.querySelector('i').className = 'fas fa-sun';
        } else {
            rootElement.setAttribute('data-theme', 'dark'); // Default target dark
            toggleBtn.querySelector('i').className = 'fas fa-sun';
        }

        toggleBtn.addEventListener('click', () => {
            const isDark = rootElement.getAttribute('data-theme') === 'dark';
            rootElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            toggleBtn.querySelector('i').className = isDark ? 'fas fa-moon' : 'fas fa-sun';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        });

        // --- Video Manager CRUD Script ---
        const host = window.location.origin;

        async function loadVideoManagerData() {
            await updateCount();
            await loadLinks();
        }

        async function updateCount() {
            try {
                const res = await fetch(`${host}/api/videos/count`);
                const data = await res.json();
                if(data.success) {
                    document.getElementById('totalCount').innerText = data.count;
                }
            } catch (err) { console.error(err); }
        }

        async function loadLinks() {
            const listContainer = document.getElementById('linkList');
            listContainer.innerHTML = `<p style="color: var(--sub-text-color); font-size:12px; text-align:center;">Loading list...</p>`;

            try {
                const res = await fetch(`${host}/api/videos`);
                const data = await res.json();
                
                if(data.success) {
                    listContainer.innerHTML = "";
                    if(data.videos.length === 0) {
                        listContainer.innerHTML = `<p style="color: var(--sub-text-color); font-size: 11px; text-align: center;">No links saved yet.</p>`;
                        return;
                    }

                    data.videos.forEach(video => {
                        const li = document.createElement('li');
                        li.className = 'link-item';
                        li.innerHTML = `
                            <a href="${video.url}" target="_blank" class="video-url">${video.url}</a>
                            <button class="delete-btn" onclick="deleteLink('${video._id}')"><i class="fas fa-trash"></i></button>
                        `;
                        listContainer.appendChild(li);
                    });
                }
            } catch (err) {
                listContainer.innerHTML = `<p style="color: var(--danger-accent); font-size:11px; text-align:center;">Server connection failed.</p>`;
            }
        }

        async function addLink() {
            const urlInput = document.getElementById('videoUrl');
            const url = urlInput.value.trim();
            const btn = document.getElementById('addBtn');

            if(!url) return alert("Please paste a link first!");

            btn.disabled = true;
            btn.innerText = "...";

            try {
                const res = await fetch(`${host}/api/videos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                
                const data = await res.json();
                alert(data.message);
                
                if(data.success) {
                    urlInput.value = '';
                    await loadVideoManagerData();
                }
            } catch (err) {
                alert("Failed to connect to server!");
            } finally {
                btn.disabled = false;
                btn.innerText = "Add";
            }
        }

        async function deleteLink(id) {
            if(!confirm("Are you sure you want to delete this link?")) return;

            try {
                const res = await fetch(`${host}/api/videos/${id}`, {
                    method: 'DELETE'
                });
                const data = await res.json();
                alert(data.message);
                if(data.success) {
                    await loadVideoManagerData();
                }
            } catch (err) { alert("Error deleting link!"); }
        }

        window.addEventListener('load', loadVideoManagerData);
    </script>
</body>
  </html>
